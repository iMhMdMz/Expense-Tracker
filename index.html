<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ردیاب هزینه</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💰 ردیاب هزینه</h1>
            <p class="subtitle">ردیابی هزینه‌های خود به آسانی</p>
        </header>

        <!-- Stats Section -->
        <div class="stats-container">
            <div class="stat-card total">
                <h3>مجموع هزینه‌ها</h3>
                <p class="stat-value" id="totalExpenses">$0.00</p>
            </div>
            <div class="stat-card categories">
                <h3>دسته‌بندی‌ها</h3>
                <p class="stat-value" id="categoryCount">0</p>
            </div>
            <div class="stat-card transactions">
                <h3>تراکنش‌ها</h3>
                <p class="stat-value" id="transactionCount">0</p>
            </div>
        </div>

        <!-- Add Expense Form -->
        <div class="form-section">
            <h2>افزودن هزینه جدید</h2>
            <form id="expenseForm" class="expense-form">
                <div class="form-group">
                    <label for="date">تاریخ</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="amount">مبلغ (تومان)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="category">دسته‌بندی</label>
                    <select id="category" required>
                        <option value="">انتخاب دسته‌بندی</option>
                        <option value="Food">🍔 غذا</option>
                        <option value="Transport">🚗 حمل‌ونقل</option>
                        <option value="Entertainment">🎬 تفریح</option>
                        <option value="Utilities">💡 رفاه‌خدمات</option>
                        <option value="Healthcare">🏥 بهداشت و درمان</option>
                        <option value="Shopping">🛍️ خرید</option>
                        <option value="Education">📚 آموزش</option>
                        <option value="Other">📌 سایر</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">توضیحات</label>
                    <input type="text" id="description" placeholder="مثال: ناهار با دوستان">
                </div>

                <button type="submit" class="btn btn-primary">افزودن هزینه</button>
            </form>
        </div>

        <!-- Filters Section -->
        <div class="filters-section">
            <h2>فهرست هزینه‌ها</h2>
            <div class="filters">
                <div class="filter-group">
                    <label for="filterCategory">فیلتر بر اساس دسته‌بندی:</label>
                    <select id="filterCategory">
                        <option value="">همه دسته‌ها</option>
                        <option value="Food">🍔 غذا</option>
                        <option value="Transport">🚗 حمل‌ونقل</option>
                        <option value="Entertainment">🎬 تفریح</option>
                        <option value="Utilities">💡 رفاه‌خدمات</option>
                        <option value="Healthcare">🏥 بهداشت و درمان</option>
                        <option value="Shopping">🛍️ خرید</option>
                        <option value="Education">📚 آموزش</option>
                        <option value="Other">📌 سایر</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sortBy">مرتب‌سازی:</label>
                    <select id="sortBy">
                        <option value="date-desc">اخیرترین اول</option>
                        <option value="date-asc">قدیمی‌ترین اول</option>
                        <option value="amount-desc">بیشترین مبلغ</option>
                        <option value="amount-asc">کمترین مبلغ</option>
                    </select>
                </div>

                <button class="btn btn-secondary" id="clearAll">حذف همه</button>
            </div>
        </div>

        <!-- Category Summary -->
        <div id="categorySummary" class="category-summary"></div>

        <!-- Expenses Table -->
        <div class="table-section">
            <div id="expensesContainer">
                <p class="empty-message">هنوز هزینه‌ای ثبت نشده است. یکی را اضافه کنید!</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
