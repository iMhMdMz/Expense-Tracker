<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>💰 Expense Tracker</h1>
            <p class="subtitle">Track your expenses easily</p>
        </header>

        <!-- Stats Section -->
        <div class="stats-container">
            <div class="stat-card total">
                <h3>Total Expenses</h3>
                <p class="stat-value" id="totalExpenses">$0.00</p>
            </div>
            <div class="stat-card categories">
                <h3>Categories</h3>
                <p class="stat-value" id="categoryCount">0</p>
            </div>
            <div class="stat-card transactions">
                <h3>Transactions</h3>
                <p class="stat-value" id="transactionCount">0</p>
            </div>
        </div>

        <!-- Add Expense Form -->
        <div class="form-section">
            <h2>Add New Expense</h2>
            <form id="expenseForm" class="expense-form">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select a category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Utilities">💡 Utilities</option>
                        <option value="Healthcare">🏥 Healthcare</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Education">📚 Education</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Lunch with friends">
                </div>

                <button type="submit" class="btn btn-primary">Add Expense</button>
            </form>
        </div>

        <!-- Filters Section -->
        <div class="filters-section">
            <h2>Expenses List</h2>
            <div class="filters">
                <div class="filter-group">
                    <label for="filterCategory">Filter by Category:</label>
                    <select id="filterCategory">
                        <option value="">All Categories</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Utilities">💡 Utilities</option>
                        <option value="Healthcare">🏥 Healthcare</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Education">📚 Education</option>
                        <option value="Other">📌 Other</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sortBy">Sort by:</label>
                    <select id="sortBy">
                        <option value="date-desc">Latest First</option>
                        <option value="date-asc">Oldest First</option>
                        <option value="amount-desc">Highest Amount</option>
                        <option value="amount-asc">Lowest Amount</option>
                    </select>
                </div>

                <button class="btn btn-secondary" id="clearAll">Clear All</button>
            </div>
        </div>

        <!-- Category Summary -->
        <div id="categorySummary" class="category-summary"></div>

        <!-- Expenses Table -->
        <div class="table-section">
            <div id="expensesContainer">
                <p class="empty-message">No expenses yet. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
